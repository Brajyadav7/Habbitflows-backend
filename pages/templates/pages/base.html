<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{% block title %}HabitFlows{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="/static/habits/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--surface:#111120;--border:#252538;--text:#f0f0fa;--text2:#a0a0c0;--muted:#555570;--lime:#c8ff00;--r:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;line-height:1.7}
a{color:var(--lime);text-decoration:none}
a:hover{text-decoration:underline}
.nav{background:rgba(8,8,16,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:60px;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:auto}
.nav-logo-icon{width:32px;height:32px;flex-shrink:0}
.nav-logo-text{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text)}
.nav-logo-text span{color:var(--lime)}
.nav-link{font-size:13px;color:var(--text2);padding:6px 12px;border-radius:8px;transition:all .15s;text-decoration:none}
.nav-link:hover{background:var(--surface);color:var(--text);text-decoration:none}
.nav-link.cta{background:var(--lime);color:#080810;font-weight:700}
.nav-link.cta:hover{opacity:.9}
.wrap{max-width:780px;margin:0 auto;padding:48px 24px 80px}
.page-title{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;margin-bottom:8px;letter-spacing:-1px}
.page-title span{color:var(--lime)}
.page-sub{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;margin-bottom:40px;text-transform:uppercase;letter-spacing:1px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px 32px;margin-bottom:20px}
.card h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--lime);margin-bottom:12px}
.card p{color:var(--text2);font-size:14px;margin-bottom:10px}
.card p:last-child{margin-bottom:0}
.card a{color:var(--lime)}
.footer{background:var(--surface);border-top:1px solid var(--border);padding:32px 24px;margin-top:auto}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;flex-wrap:wrap;gap:20px;align-items:center;justify-content:space-between}
.footer-logo{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text)}
.footer-logo span{color:var(--lime)}
.footer-links{display:flex;gap:16px;flex-wrap:wrap}
.footer-links a{font-size:12px;color:var(--muted);text-decoration:none;transition:color .15s}
.footer-links a:hover{color:var(--lime)}
.footer-copy{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
@media(max-width:600px){.page-title{font-size:26px}.wrap{padding:32px 16px 60px}.card{padding:18px 16px}}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">
    <svg class="nav-logo-icon" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#c8ff00"/><rect x="7" y="8" width="3" height="16" rx="1.5" fill="#080810"/><rect x="7" y="14" width="9.5" height="3" rx="1.5" fill="#080810"/><rect x="14.5" y="8" width="3" height="8" rx="1.5" fill="#080810"/><path d="M18.5 17.5L21.5 21 28 11.5" stroke="#080810" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="nav-logo-text">Habit<span>Flows</span></span>
  </a>
  <a href="/blog/"    class="nav-link">Blog</a>
  <a href="/about/"   class="nav-link">About</a>
  <a href="/contact/" class="nav-link">Contact</a>
  <a href="/privacy/" class="nav-link">Privacy</a>
  <a href="/terms/"   class="nav-link">Terms</a>
  <a href="/auth/login/"  class="nav-link" style="border:1.5px solid var(--border2);border-radius:9px">Log In</a>
  <a href="/auth/signup/" class="nav-link cta">Sign Up Free</a>
</nav>
<div class="wrap">{% block content %}{% endblock %}</div>
<footer class="footer">
  <div class="footer-inner">
    <span class="footer-logo">Habit<span>Flows</span></span>
    <div class="footer-links">
      <a href="/about/">About Us</a>
      <a href="/contact/">Contact</a>
      <a href="/privacy/">Privacy Policy</a>
      <a href="/terms/">Terms &amp; Conditions</a>
    </div>
    <span class="footer-copy">&copy; 2026 HabitFlows · habitfloww@gmail.com</span>
  </div>
</footer>
</body>
</html>
