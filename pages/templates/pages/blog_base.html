<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{% block title %}HabitFlows Blog{% endblock %}</title>
<meta name="description" content="{% block meta_desc %}Tips and guides on building habits, productivity, and self-improvement.{% endblock %}"/>
<link rel="icon" type="image/svg+xml" href="/static/habits/favicon.svg">
<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9964757532643280" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--surface:#111120;--border:#252538;--border2:#2e2e48;--text:#f0f0fa;--text2:#a0a0c0;--muted:#555570;--lime:#c8ff00;--r:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;line-height:1.8}
a{color:var(--lime);text-decoration:none}
a:hover{text-decoration:underline}
.nav{background:rgba(8,8,16,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;height:64px;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:auto}
.logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text)}
.logo-text span{color:var(--lime)}
.nav-link{font-size:13px;color:var(--text2);padding:6px 12px;border-radius:8px;text-decoration:none;transition:all .15s}
.nav-link:hover{background:var(--surface);color:var(--text);text-decoration:none}
.btn{padding:8px 18px;border-radius:10px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;text-decoration:none;display:inline-block;transition:opacity .2s}
.btn-lime{background:var(--lime);color:#080810}
.btn-lime:hover{opacity:.88;text-decoration:none}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--lime);color:var(--lime);text-decoration:none}
/* LAYOUT */
.container{max-width:800px;margin:0 auto;padding:48px 24px 80px}
/* ARTICLE */
.article-header{margin-bottom:36px}
.article-cat{display:inline-block;background:rgba(200,255,0,.1);border:1px solid rgba(200,255,0,.2);color:var(--lime);font-family:'DM Mono',monospace;font-size:10px;padding:3px 12px;border-radius:99px;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.article-title{font-family:'Syne',sans-serif;font-size:clamp(28px,4vw,42px);font-weight:800;line-height:1.2;letter-spacing:-1px;margin-bottom:16px}
.article-meta{display:flex;align-items:center;gap:16px;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;flex-wrap:wrap}
.article-meta span{display:flex;align-items:center;gap:4px}
.article-body{font-size:16px;color:var(--text2);line-height:1.85}
.article-body h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin:36px 0 14px;letter-spacing:-.5px}
.article-body h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin:24px 0 10px}
.article-body p{margin-bottom:18px}
.article-body ul,.article-body ol{margin:0 0 18px 24px}
.article-body li{margin-bottom:8px;color:var(--text2)}
.article-body strong{color:var(--text);font-weight:600}
.article-body blockquote{border-left:3px solid var(--lime);padding:12px 20px;background:rgba(200,255,0,.05);border-radius:0 8px 8px 0;margin:24px 0;font-style:italic;color:var(--text)}
.article-body .highlight{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin:24px 0}
/* AD SLOT */
.ad-slot{margin:32px 0;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;min-height:100px}
.ad-slot-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
/* CTA BOX */
.cta-box{background:linear-gradient(135deg,rgba(200,255,0,.06),rgba(200,255,0,.02));border:1px solid rgba(200,255,0,.2);border-radius:var(--r);padding:28px 32px;margin:36px 0;text-align:center}
.cta-box h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:8px}
.cta-box p{color:var(--text2);font-size:14px;margin-bottom:20px}
/* BLOG LIST */
.blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-top:32px}
.blog-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;transition:border-color .2s;display:block;text-decoration:none}
.blog-card:hover{border-color:rgba(200,255,0,.3);text-decoration:none}
.blog-card-cat{font-family:'DM Mono',monospace;font-size:10px;color:var(--lime);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.blog-card-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text);margin-bottom:10px;line-height:1.3}
.blog-card-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.blog-card-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
/* FOOTER */
.footer{background:var(--surface);border-top:1px solid var(--border);padding:24px}
.footer-inner{max-width:1080px;margin:0 auto;display:flex;flex-wrap:wrap;gap:12px 24px;align-items:center;justify-content:space-between}
.footer-logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800}
.footer-logo span{color:var(--lime)}
.footer-links{display:flex;gap:16px;flex-wrap:wrap}
.footer-links a{font-size:12px;color:var(--muted);text-decoration:none;transition:color .15s}
.footer-links a:hover{color:var(--lime)}
.footer-copy{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
@media(max-width:600px){.container{padding:32px 16px 60px}.article-title{font-size:28px}.nav-link{display:none}}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">
    <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#c8ff00"/><rect x="7" y="8" width="3" height="16" rx="1.5" fill="#080810"/><rect x="7" y="14" width="9.5" height="3" rx="1.5" fill="#080810"/><rect x="14.5" y="8" width="3" height="8" rx="1.5" fill="#080810"/><path d="M18.5 17.5L21.5 21 28 11.5" stroke="#080810" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="logo-text">Habit<span>Flows</span></span>
  </a>
  <a href="/blog/"    class="nav-link">Blog</a>
  <a href="/about/"   class="nav-link">About</a>
  <a href="/contact/" class="nav-link">Contact</a>
  <a href="/auth/login/"  class="btn btn-outline">Log In</a>
  <a href="/auth/signup/" class="btn btn-lime">Sign Up Free</a>
</nav>

{% block content %}{% endblock %}

<footer class="footer">
  <div class="footer-inner">
    <span class="footer-logo">Habit<span>Flows</span></span>
    <div class="footer-links">
      <a href="/blog/">Blog</a>
      <a href="/about/">About Us</a>
      <a href="/contact/">Contact</a>
      <a href="/privacy/">Privacy Policy</a>
      <a href="/terms/">Terms</a>
    </div>
    <span class="footer-copy">&copy; 2026 HabitFlows &middot; habitfloww@gmail.com</span>
  </div>
</footer>
</body>
</html>
