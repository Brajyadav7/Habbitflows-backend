services:
  - type: web
    name: habitflows-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn habitflow.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: habitflows-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
        
databases:
  - name: habitflows-db
    databaseName: habitflows
    user: habitflows_user
